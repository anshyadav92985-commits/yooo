<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTP + Notification</title>
</head>
<body style="background:#0f172a;color:white;text-align:center;margin-top:100px;font-family:sans-serif">

<h2>Email OTP Login</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<button onclick="sendLink()">Send OTP</button>

<br><br>
<button onclick="enableNotification()">Enable Notifications</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  sendSignInLinkToEmail,
  isSignInWithEmailLink,
  signInWithEmailLink
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getMessaging,
  getToken,
  onMessage
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFP57-rvdlSMoTqEKtb8iB7WKdeQD0ElM",
  authDomain: "yoooo-a2adb.firebaseapp.com",
  projectId: "yoooo-a2adb",
  storageBucket: "yoooo-a2adb.firebasestorage.app",
  messagingSenderId: "649222863466",
  appId: "1:649222863466:web:37d24a4bf93734d7b02813"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const messaging = getMessaging(app);

// ✅ FIXED DOMAIN (your GitHub link)
const actionCodeSettings = {
  url: "https://anshyadav92985-commits.github.io/yooo/index.html",
  handleCodeInApp: true,
};

// 📩 Send OTP
window.sendLink = async () => {
  const email = document.getElementById("email").value;

  if (!email) {
    document.getElementById("msg").innerText = "Enter email first!";
    return;
  }

  try {
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    localStorage.setItem("emailForSignIn", email);
    document.getElementById("msg").innerText = "📩 Check your email!";
  } catch (err) {
    document.getElementById("msg").innerText = "❌ " + err.message;
  }
};

// ✅ Auto login
if (isSignInWithEmailLink(auth, window.location.href)) {
  let email = localStorage.getItem("emailForSignIn");

  if (!email) email = prompt("Enter your email again");

  signInWithEmailLink(auth, email, window.location.href)
    .then(() => {
      document.getElementById("msg").innerText = "✅ Login Successful!";
    })
    .catch(() => {
      document.getElementById("msg").innerText = "❌ Login failed";
    });
}

// 🔔 Enable Notifications (FINAL FIX)
window.enableNotification = async () => {
  try {
    const permission = await Notification.requestPermission();

    if (permission === "granted") {

      const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');

      const token = await getToken(messaging, {
        vapidKey: "BIyr3vO5b-6_o0kBjAQbAxKO_pRLzN0yGIqwNoWlUb82cAfXedLG7JVOrzsIKu1ue15WbN2SQk9m2wkFQ6DoBWE",
        serviceWorkerRegistration: registration
      });

      console.log("🔥 FCM Token:", token);
      document.getElementById("msg").innerText = "✅ Token generated! Check console.";
    } else {
      document.getElementById("msg").innerText = "❌ Permission denied";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerText = "❌ Error: " + err.message;
  }
};

// 📲 Foreground notification
onMessage(messaging, (payload) => {
  alert("📩 " + payload.notification.title);
});
</script>

</body>
</html>
